<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Live Website Maker & Sticker Studio</title>
    <style>
        /* Base Layout Rules */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f0f2f5; transition: all 0.3s ease; }
        
        /* 💻 LAPTOP VIEW (3-Column Layout Workspace) */
        body.laptop-mode { display: flex; height: 100vh; overflow: hidden; }
        body.laptop-mode .editor-side { width: 28%; height: 100vh; border-right: 1px solid #dee2e6; }
        body.laptop-mode .terminal-side { width: 32%; height: 100vh; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; }
        body.laptop-mode .preview-side { width: 40%; height: 100vh; }

        /* 📱 TABLET VIEW (Vertical Stack Layout Workspace) */
        body.tablet-mode { display: flex; flex-direction: column; height: auto; overflow-y: auto; }
        body.tablet-mode .editor-side { width: 100%; height: auto; border-bottom: 2px solid #dee2e6; }
        body.tablet-mode .terminal-side { width: 100%; padding: 20px; border-bottom: 2px solid #dee2e6; display: block; }
        body.tablet-mode .terminal-logs { height: 120px; }
        body.tablet-mode .preview-side { width: 100%; padding: 40px 20px; min-height: 500px; }

        /* Component Framework Architecture Layout */
        .editor-side { background: white; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        .terminal-side { background: #0b0f19; padding: 20px; box-sizing: border-box; gap: 10px; color: #94a3b8; }
        .terminal-logs { flex: 1; width: 100%; background: #020617; border-radius: 8px; border: 1px solid #1e293b; padding: 15px; font-family: monospace; font-size: 13px; color: #34d399; overflow-y: auto; white-space: pre-wrap; box-sizing: border-box; line-height: 1.5; }
        .preview-side { padding: 40px; display: flex; justify-content: center; align-items: center; box-sizing: border-box; position: relative; }
        
        /* Form Inputs & Headings */
        h2 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; margin-bottom: 5px; }
        h3 { margin: 5px 0; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        label { font-weight: 600; color: #4a5568; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 70px; resize: none; }
        
        /* Layout Swapper Switch Panel */
        .layout-toggle-panel { background: #f1f5f9; padding: 8px; border-radius: 8px; display: flex; gap: 8px; margin-bottom: 5px; }
        .toggle-btn { flex: 1; padding: 10px; font-size: 13px; background: white; color: #4a5568; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .toggle-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }

        /* Action Buttons Theme Row */
        .ai-badge-box { background: linear-gradient(135deg, #1a73e8 0%, #00c4cc 100%); padding: 15px; border-radius: 12px; color: white; display: flex; flex-direction: column; gap: 8px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; margin-top: 5px; }
        button:hover { opacity: 0.9; }
        .btn-ai { background: #ff4757; color: white; }
        .btn-sticker { background-color: #00c4cc; color: #0f172a; }
        .btn-download { background-color: #2ecc71; margin-top: auto; }
        .btn-download:hover { background-color: #27ae60; }

        /* Output View Card Display Frame */
        #outputCard { background: orange; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; word-wrap: break-word; position: relative; min-height: 250px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; box-sizing: border-box; }
        #outputHeading { margin: 20px 0 10px 0; }
        #outputParagraph { margin: 0; }

        /* Draggable Emoji Layer */
        .emoji-sticker { position: absolute; font-size: 50px; cursor: move; user-select: none; touch-action: none; z-index: 100; left: 45%; top: 45%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15)); }
    </style>
</head>
<body class="laptop-mode">

    <!-- COLUMN 1: System Controller Dashboard -->
    <div class="editor-side">
        <h2>🛠 shrink Studio</h2>
        
        <!-- Platform Layout Screen Mode Swapper Switch -->
        <div class="layout-toggle-panel">
            <button class="toggle-btn active" id="laptopToggle" onclick="switchInterfaceLayout('laptop')">💻 Laptop View</button>
            <button class="toggle-btn" id="tabletToggle" onclick="switchInterfaceLayout('tablet')">📱 Tablet View</button>
        </div>

        <!-- AutoGPT AI Input Prompt Box -->
        <div class="ai-badge-box">
            <label for="aiPrompt" style="color: white;">🪄 AutoGPT Agent Theme Directive:</label>
            <input type="text" id="aiPrompt" placeholder="Try: space theme, gaming terminal, puppy base...">
            <button class="btn-ai" onclick="runAutoGPTAgentLoop()">⚡ Build with AutoGPT AI</button>
        </div>

        <h3>📝 Canvas Content Config</h3>
        <label for="inputTitle">Website Title / Heading:</label>
        <input type="text" id="inputTitle" value="My Sticker Page" oninput="refreshCanvasSync()">

        <label for="inputColor">Background Color Style:</label>
        <input type="text" id="inputColor" value="orange" oninput="refreshCanvasSync()">

        <label for="inputParagraph">Main Message Text Box:</label>
        <textarea id="inputParagraph" oninput="refreshCanvasSync()">Drag emojis onto your website canvas!</textarea>

        <h3>🎨 Sticker Graphic Asset Library</h3>
        <label for="inputEmoji">Type an Emoji Sticker to Spawn:</label>
        <div style="display:flex; gap:10px;">
            <input type="text" id="inputEmoji" value="🚀" style="width:70px; text-align:center; font-size: 18px;">
            <button class="btn-sticker" onclick="spawnActiveStudioEmoji()">➕ Spawn Sticker</button>
        </div>

        <button class="btn-download" onclick="downloadWebsiteProject()">📥 Download Website File</button>
    </div>

    <!-- COLUMN 2: Continuous Automation AI Stream Log Console Box -->
    <div class="terminal-side" id="terminalColumn">
        <h3>💻 AutoGPT Agent Terminal Console</h3>
        <div class="terminal-logs" id="terminalLogWindow">SYSTEM: Multi-layout agent core ready. Toggle views above or execute AI directive parameters...</div>
    </div>

    <!-- COLUMN 3: Live Output Interactive Sandbox Frame -->
    <div class="preview-side" id="previewArea">
        <div id="outputCard">
            <h1 id="outputHeading">My Sticker Page</h1>
            <p id="outputParagraph">Drag emojis onto your website canvas!</p>
        </div>
    </div>

    <script>
        const logs = document.getElementById('terminalLogWindow');

        // Dynamic State Interface Layout Swapper Engine
        function switchInterfaceLayout(targetMode) {
            const body = document.body;
            const lapBtn = document.getElementById('laptopToggle');
            const tabBtn = document.getElementById('tabletToggle');

            if (targetMode === 'laptop') {
                body.className = "laptop-mode";
                lapBtn.className = "toggle-btn active";
                tabBtn.className = "toggle-btn";
                pushConsoleLog("SYSTEM: Interface switched to Widescreen Laptop layout. 3-Column console matrix active.");
            } else {
                body.className = "tablet-mode";
                lapBtn.className = "toggle-btn";
                tabBtn.className = "toggle-btn active";
                pushConsoleLog("SYSTEM: Interface switched to Portrait Tablet layout. Stacked scrolling panels enabled.");
            }
        }

        function pushConsoleLog(msg) {
            logs.innerText += "\n" + msg;
            logs.scrollTop = logs.scrollHeight; 
        }

        function refreshCanvasSync() {
            document.getElementById('outputHeading').innerText = document.getElementById('inputTitle').value;
            document.getElementById('outputParagraph').innerText = document.getElementById('inputParagraph').value;
            document.getElementById('previewArea').style.backgroundColor = 'transparent'; 
            document.getElementById('outputCard').style.backgroundColor = document.getElementById('inputColor').value;
        }

        // AutoGPT Intelligent Semantic Target Parser Script Loop
        function runAutoGPTAgentLoop() {
            const prompt = document.getElementById('aiPrompt').value.toLowerCase().trim();
            if (!prompt) {
                pushConsoleLog("⚠️ AGENT EXCEPTION: Target query prompt parameter is missing.");
                return;
            }

            pushConsoleLog(`\n🤖 AGENT LOOP DEPLOYED: objective = "${prompt}"`);
            pushConsoleLog("[THOUGHTS]: Parsing text token variables to resolve corresponding CSS backgrounds and layout blocks.");

            let heading = "Custom Asset Station";
            let color = "gray";
            let text = "Landing portal dynamically generated by assistant loop scripts matching your target criteria.";

            if (prompt.includes("space") || prompt.includes("galaxy") || prompt.includes("alien")) {
                heading = "🌌 Deep Space Outpost"; color = "black";
                text = "Welcome to deep quadrant coordinates. Monitoring asteroid fields and planetary orbit telemetry loops live.";
document.getElementById('inputEmoji').value = "🛸";document.getElementById('outputHeading').style.color = "#ffffff"; document.getElementById('outputParagraph').style.color = "#a1a1aa";} else if (prompt.includes("game") || prompt.includes("gaming") || prompt.includes("arcade")) {heading = "🕹️ Level Up Arcade Hub"; color = "green";text = "The master terminal game matrix layer is loaded. Controller device hooks verified, frame rates stable.";document.getElementById('inputEmoji').value = "👾";document.getElementById('outputHeading').style.color = "#ffffff"; document.getElementById('outputParagraph').style.color = "#f4f4f5";} else if (prompt.includes("puppy") || prompt.includes("dog") || prompt.includes("cat") || prompt.includes("cute")) {heading = "🐾 The Cozy Animal Haven"; color = "pink";text = "Welcome to the soft animal sanctuary grid workspace layout! Playtime variables active, snacks are ready.";document.getElementById('inputEmoji').value = "🐶";document.getElementById('outputHeading').style.color = "#18181b"; document.getElementById('outputParagraph').style.color = "#52525b";} else {heading = "The " + prompt.charAt(0).toUpperCase() + prompt.slice(1) + " Studio"; color = "lightblue";text = "A specialized custom landing page portal designed perfectly around configurations matching your prompt input: " + prompt;document.getElementById('outputHeading').style.color = "#18181b"; document.getElementById('outputParagraph').style.color = "#3f3f46";}setTimeout(() => {pushConsoleLog("[ACTION]: Writing markup codes, building style sheets, and generating component layout strings.");document.getElementById('inputTitle').value = heading;document.getElementById('inputColor').value = color;document.getElementById('inputParagraph').value = text;refreshCanvasSync();pushConsoleLog("✅ LOG SUCCESS: Autonomous agent document generation cycle complete.");}, 800);}// Spawn a brand new asset component directly inside memoryfunction spawnActiveStudioEmoji() {const emojiChar = document.getElementById('inputEmoji').value.trim();if(!emojiChar) return;const sticker = document.createElement('div');sticker.className = 'emoji-sticker';sticker.innerText = emojiChar;sticker.style.left = (Math.random() * 50 + 25) + '%';sticker.style.top = (Math.random() * 50 + 25) + '%';applyCrossPlatformDraggableEngine(sticker);document.getElementById('outputCard').appendChild(sticker);pushConsoleLog(SYSTEM: Created brand new interactive sticker graphic asset [${emojiChar}] on card layout.);}// Fixed Cross-Platform Pointer Engine using explicit array indexing [0] for touch gesturesfunction applyCrossPlatformDraggableEngine(targetElement) {let changeX = 0, changeY = 0, currentX = 0, currentY = 0;targetElement.onmousedown = dragStartRoutine;targetElement.ontouchstart = dragStartRoutine;function dragStartRoutine(event) {event = event || window.event;// Fixed coordinate parser layer targeting [0] array for mobile touch screensconst coordinateX = event.touches ? event.touches[0].clientX : event.clientX;const coordinateY = event.touches ? event.touches[0].clientY : event.clientY;currentX = coordinateX;currentY = coordinateY;document.onmouseup = dragEndRoutine; document.ontouchend = dragEndRoutine;document.onmousemove = dragMoveRoutine; document.ontouchmove = dragMoveRoutine;}function dragMoveRoutine(event) {event = event || window.event;const coordinateX = event.touches ? event.touches[0].clientX : event.clientX;const coordinateY = event.touches ? event.touches[0].clientY : event.clientY;changeX = currentX - coordinateX;changeY = currentY - coordinateY;currentX = coordinateX;currentY = coordinateY;targetElement.style.top = (targetElement.offsetTop - changeY) + "px";targetElement.style.left = (targetElement.offsetLeft - changeX) + "px";}function dragEndRoutine() {document.onmouseup = null; document.onmousemove = null;document.ontouchend = null; document.ontouchmove = null;}}// Production file markup packer exporter routinefunction downloadWebsiteProject() {const designHtml = document.getElementById('outputCard').innerHTML;const currentBg = document.getElementById('outputCard').style.backgroundColor || 'orange';const hColor = document.getElementById('outputHeading').style.color || '#000000';const pColor = document.getElementById('outputParagraph').style.color || '#333333';const layoutTemplate = <!DOCTYPE html> <html> <head> <meta charset="UTF-8"><title>My Studio Design Page</title> <style> body { font-family: sans-serif; margin:0; height:100vh; display:flex; justify-content:center; align-items:center; background-color: #f0f2f5; } .card { background: ${currentBg}; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; word-wrap: break-word; position: relative; min-height: 250px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 20px; box-sizing: border-box; } h1 { margin: 20px 0 10px 0; font-size: 32px; color: ${hColor}; } p { margin: 0; color: ${pColor}; font-size: 16px; max-width: 85%; text-align: center; } .emoji-sticker { position: absolute; font-size: 50px; user-select: none; } </style> </head> <body><div class="card">${designHtml}</div></body></html>;const blob = new Blob([layoutTemplate], { type: 'text/html' });const link = document.createElement('a');link.href = URL.createObjectURL(blob);link.download = 'my-ai-studio-website.html';link.click();}refreshCanvasSync();
